    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--forest); color: var(--white); height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .header {
      background: var(--forest);
      border-bottom: 1px solid rgba(255,255,255,.1);

    .header-logo {

    .header-title { font-size: 13px; color: rgba(255,255,255,.5); }

    .filter-btn {

    .filter-btn[data-type="State Park"].active { background: rgba(26,111,168,.3); border-color: #1A6FA8; color: #7BB8E8; }
    .filter-btn[data-type="Private Campground"].active { background: rgba(192,122,32,.3); border-color: #C07A20; color: #E8B870; }
    .filter-btn[data-type="County Campground"].active { background: rgba(107,76,168,.3); border-color: #6B4CA8; color: #B8A0E0; }

    .search-wrap { margin-left: auto; position: relative; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.3); pointer-events: none; }
    #searchBox {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);

      outline: none; transition: border-color .15s;
    }
    #searchBox::placeholder { color: rgba(255,255,255,.3); }
    #searchBox:focus { border-color: rgba(255,255,255,.3); }

    /* ── MAP ── */
    #map { flex: 1; }

    /* ── LEGEND ── */
    .legend {
      position: absolute; bottom: 28px; right: 10px; z-index: 1000;
      background: rgba(15,43,30,.92); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 12px 14px; backdrop-filter: blur(8px);
      font-size: 12px;
    }
    .legend-title { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 10px; }
    .legend-row { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.75); margin-bottom: 6px; }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-count { margin-left: auto; padding-left: 16px; color: rgba(255,255,255,.35); font-size: 11px; }

    /* ── LEAFLET POPUP ── */
    .leaflet-popup-content-wrapper {
      background: var(--forest) !important;
      border: 1px solid rgba(255,255,255,.12) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.5) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: 240px !important; }
    .leaflet-popup-tip { background: var(--forest) !important; }
    .leaflet-popup-close-button { color: rgba(255,255,255,.4) !important; top: 10px !important; right: 10px !important; font-size: 16px !important; }
    .leaflet-popup-close-button:hover { color: var(--white) !important; }
    .popup-header { padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .popup-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 4px; }
    .popup-name { font-size: 14px; font-weight: 700; color: var(--white); line-height: 1.3; }
    .popup-body { padding: 10px 16px 14px; }
    .popup-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: rgba(255,255,255,.55); margin-bottom: 5px; }
    .popup-row:last-of-type { margin-bottom: 0; }
    .popup-link {

      font-size: 12px; font-weight: 600; text-decoration: none;
      transition: background .15s;
    }
    .popup-link:hover { background: #5A9C7A; }
  </style>

// ── MAP INIT ──────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [47.4, -121.5],
  zoom: 7,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── COLORS ───────────────────────────────────────────────────────────────
const TYPE_CONFIG = {
  'National Park':      { color: '#2D7D46', label: 'National Park' },
  'State Park':         { color: '#1A6FA8', label: 'State Park' },
  'Private Campground': { color: '#C07A20', label: 'Private' },
  'County Campground':  { color: '#6B4CA8', label: 'County' },
};
const fallbackColor = '#888';

function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="30" viewBox="0 0 22 30">
    <path d="M11 0C4.925 0 0 4.925 0 11c0 8.25 11 19 11 19s11-10.75 11-19C22 4.925 17.075 0 11 0z" fill="${color}" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <circle cx="11" cy="11" r="4.5" fill="rgba(255,255,255,0.9)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [22, 30],
    iconAnchor: [11, 30],
    popupAnchor: [0, -28],
  });
}

// ── POPUP HTML ────────────────────────────────────────────────────────────
function popupHTML(c) {
  const cfg = TYPE_CONFIG[c.type] || { color: fallbackColor, label: c.type };
  const hookupIcon = c.hookups === 'No hookups' ? '⚡' : c.hookups.includes('Full') ? '🔌' : '🔌';
  const hookupStyle = c.hookups === 'No hookups' ? 'color:rgba(255,255,255,.35)' : 'color:rgba(144,210,160,.9)';
  return `
    <div class="popup-header">
      <div class="popup-type" style="color:${cfg.color}">${cfg.label}</div>
      <div class="popup-name">${c.name}</div>
    </div>
    <div class="popup-body">
      <div class="popup-row">📍 ${c.town}</div>
      <div class="popup-row">🚗 ${c.drive}</div>
      <div class="popup-row" style="${hookupStyle}">${hookupIcon} ${c.hookups}</div>
      <a class="popup-link" href="/campground/${c.slug}" target="_blank">
        View listing
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 5.5h7M6 2.5l3 3-3 3"/></svg>
      </a>
    </div>`;
}

// ── BUILD MARKERS ─────────────────────────────────────────────────────────
const markers = [];
const layerGroups = {};
Object.keys(TYPE_CONFIG).forEach(t => { layerGroups[t] = L.layerGroup().addTo(map); });

const typeCounts = {};
CAMPS.forEach(c => {
  const cfg = TYPE_CONFIG[c.type];
  const color = cfg ? cfg.color : fallbackColor;
  const marker = L.marker([c.lat, c.lon], { icon: makeIcon(color) })
    .bindPopup(popupHTML(c), { maxWidth: 260 });
  const group = layerGroups[c.type];
  if (group) group.addLayer(marker);
  else marker.addTo(map);
  markers.push({ marker, camp: c, group });
  typeCounts[c.type] = (typeCounts[c.type] || 0) + 1;
});

// ── LEGEND ────────────────────────────────────────────────────────────────
const legendControl = L.control({ position: 'bottomright' });
legendControl.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `<div class="legend-title">Campground Type</div>` +
    Object.entries(TYPE_CONFIG).map(([type, cfg]) =>
      `<div class="legend-row">
        <span class="legend-dot" style="background:${cfg.color}"></span>
        ${cfg.label}
        <span class="legend-count">${typeCounts[type] || 0}</span>
      </div>`
    ).join('');
  return div;
};
legendControl.addTo(map);

// ── FILTER LOGIC ──────────────────────────────────────────────────────────
let activeType = 'all';
let searchQuery = '';

function applyFilters() {
  let count = 0;
  markers.forEach(({ marker, camp, group }) => {
    const typeMatch = activeType === 'all' || camp.type === activeType;
    const searchMatch = !searchQuery || camp.name.toLowerCase().includes(searchQuery) || camp.town.toLowerCase().includes(searchQuery);
    const visible = typeMatch && searchMatch;
    if (visible) {
      if (group && !group.hasLayer(marker)) group.addLayer(marker);
      else if (!group) marker.addTo(map);
      count++;
    } else {
      if (group) group.removeLayer(marker);
      else map.removeLayer(marker);
    }
  });
  document.getElementById('visibleCount').textContent = count;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    applyFilters();
  });
});

document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  applyFilters();
});
</script>
